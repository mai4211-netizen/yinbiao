<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phonics Decode · Encode</title>
  <style>
    :root {
      --bg: #0d0f17;
      --bg-soft: #151929;
      --panel: rgba(20, 24, 38, 0.92);
      --panel-strong: rgba(12, 16, 28, 0.98);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f2ea;
      --muted: #b5b8c7;
      --accent: #f3c969;
      --accent-2: #7ad3c9;
      --danger: #f58e8e;
      --success: #8dd6a3;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      --radius: 22px;
      --radius-sm: 14px;
      --mono: "SFMono-Regular", "Cascadia Code", "Roboto Mono", Consolas, monospace;
      --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      --sans: "Avenir Next", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --cat-1: #f1a76f;
      --cat-2: #89d4b7;
      --cat-3: #88b0ff;
      --cat-4: #d8a5ff;
      --cat-5: #f6d56e;
      --cat-6: #ff9db2;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(243, 201, 105, 0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(122, 211, 201, 0.1), transparent 24%),
        linear-gradient(160deg, #090b12 0%, #0d0f17 35%, #111522 100%);
      color: var(--text);
      font-family: var(--sans);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 88%);
      opacity: 0.55;
    }

    button, input {
      font: inherit;
    }

    .app-shell {
      width: min(1220px, calc(100vw - 24px));
      margin: 20px auto 40px;
      position: relative;
      z-index: 1;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 28px;
      background: linear-gradient(135deg, rgba(22, 28, 44, 0.96), rgba(13, 15, 23, 0.9));
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -70px;
      top: -40px;
      width: 240px;
      height: 240px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(243, 201, 105, 0.28), transparent 68%);
      filter: blur(6px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.9fr;
      gap: 22px;
      margin-top: 18px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(34px, 6vw, 58px);
      line-height: 0.98;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .hero-copy p {
      max-width: 760px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(10px);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      margin-top: 10px;
      font-size: 26px;
      font-family: var(--serif);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .tab-btn, .pill-btn, .action-btn, .ghost-btn, .audio-btn, .mic-btn {
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .tab-btn {
      min-height: 46px;
      padding: 0 18px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tab-btn.active,
    .pill-btn.active {
      background: linear-gradient(135deg, rgba(243, 201, 105, 0.22), rgba(243, 201, 105, 0.08));
      border-color: rgba(243, 201, 105, 0.42);
      box-shadow: 0 0 0 1px rgba(243, 201, 105, 0.2) inset;
    }

    .tab-btn:hover,
    .pill-btn:hover,
    .action-btn:hover,
    .ghost-btn:hover,
    .audio-btn:hover,
    .mic-btn:hover {
      transform: translateY(-1px);
    }

    .panels {
      margin-top: 18px;
      display: grid;
      gap: 18px;
    }

    .panel {
      display: none;
      padding: 22px;
      background: var(--panel);
      border-radius: 26px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .panel.active {
      display: block;
    }

    .section-head {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 650;
    }

    .section-head p {
      margin: 6px 0 0;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.7;
    }

    .search-box {
      min-width: min(100%, 320px);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .search-box input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      outline: none;
    }

    .rules-grid,
    .plan-grid,
    .trainer-layout,
    .summary-grid {
      display: grid;
      gap: 16px;
    }

    .rules-grid {
      grid-template-columns: 1fr;
    }

    .rule-card,
    .plan-card,
    .trainer-card,
    .summary-card,
    .feedback-card {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .rule-toggle {
      width: 100%;
      padding: 18px 18px 16px;
      background: transparent;
      border: none;
      color: inherit;
      text-align: left;
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .rule-title {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .rule-swatch {
      width: 14px;
      height: 54px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .rule-meta h3 {
      margin: 0;
      font-size: 21px;
      font-weight: 650;
      font-family: var(--serif);
    }

    .rule-meta p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .rule-count {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .rule-body {
      padding: 0 18px 18px;
      display: grid;
      gap: 14px;
    }

    .rule-intro {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      line-height: 1.7;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .rule-row {
      display: grid;
      grid-template-columns: minmax(0, 190px) minmax(0, 180px) minmax(0, 1fr) minmax(0, 210px);
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      align-items: start;
    }

    .rule-row.match {
      border-color: rgba(243, 201, 105, 0.34);
      background: rgba(243, 201, 105, 0.08);
    }

    .pattern-chip,
    .sound-chip,
    .tag,
    .category-chip,
    .level-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      width: fit-content;
    }

    .pattern-chip,
    .sound-chip,
    .word-display,
    .ipa-display,
    .mono {
      font-family: var(--mono);
    }

    .rule-cell {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .cell-kicker {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
    }

    .sound-cell {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .sound-chip {
      justify-content: space-between;
      min-width: 112px;
    }

    .sound-demo-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .examples {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
      gap: 10px;
    }

    .example-chip {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 8px 8px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .example-chip button,
    .audio-btn,
    .mic-btn {
      min-width: 44px;
      min-height: 44px;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .audio-btn.compact {
      min-width: 44px;
      width: 44px;
      padding: 0;
      border-radius: 14px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .rule-help-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .rule-help-pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      color: var(--muted);
      font-size: 13px;
    }

    .empty-state {
      padding: 22px;
      border-radius: 22px;
      border: 1px dashed rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
    }

    .plan-subsection {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 12px;
    }

    .pairs-stack {
      display: grid;
      gap: 12px;
    }

    mark {
      background: rgba(243, 201, 105, 0.3);
      color: var(--text);
      border-radius: 4px;
      padding: 0 2px;
    }

    .plan-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .plan-card {
      padding: 18px;
    }

    .plan-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    .step-badge {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-family: var(--serif);
      font-size: 24px;
      color: #111522;
      background: linear-gradient(135deg, rgba(243, 201, 105, 1), rgba(255, 242, 178, 1));
    }

    .plan-card h3,
    .trainer-card h3,
    .summary-card h3,
    .feedback-card h3 {
      margin: 0;
      font-size: 22px;
      font-family: var(--serif);
      font-weight: 650;
    }

    .plan-card p,
    .feedback-card p,
    .summary-card p,
    .trainer-subcopy {
      color: var(--muted);
      line-height: 1.7;
    }

    .plan-list,
    .feedback-list,
    .tool-list {
      margin: 12px 0 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.75;
    }

    .pairs-grid,
    .tools-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .mini-panel {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }

    .mini-panel h3 {
      margin: 0 0 10px;
      font-size: 20px;
      font-family: var(--serif);
    }

    .trainer-layout {
      grid-template-columns: 1.1fr 0.9fr;
      align-items: start;
    }

    .trainer-card {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill-btn {
      min-height: 42px;
      padding: 0 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .progress-shell {
      display: grid;
      gap: 8px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .progress-bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(243, 201, 105, 1), rgba(122, 211, 201, 1));
    }

    .prompt-card {
      padding: 24px;
      border-radius: 24px;
      background:
        linear-gradient(140deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
        linear-gradient(180deg, rgba(243, 201, 105, 0.08), transparent 55%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      min-height: 320px;
      display: grid;
      align-content: center;
      justify-items: center;
      text-align: center;
      gap: 16px;
    }

    .word-display {
      font-size: clamp(38px, 8vw, 72px);
      font-weight: 700;
      letter-spacing: -0.04em;
      word-break: break-word;
    }

    .ipa-display {
      font-size: clamp(30px, 6vw, 50px);
      color: var(--accent);
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .action-btn {
      min-height: 48px;
      padding: 0 18px;
      background: linear-gradient(135deg, rgba(243, 201, 105, 0.24), rgba(243, 201, 105, 0.08));
      color: var(--text);
      border: 1px solid rgba(243, 201, 105, 0.34);
    }

    .ghost-btn {
      min-height: 48px;
      padding: 0 18px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .status-note,
    .recognition-note {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted);
      line-height: 1.6;
    }

    .recognition-note.error {
      border-color: rgba(245, 142, 142, 0.28);
      background: rgba(245, 142, 142, 0.08);
      color: #ffd1d1;
    }

    .recognition-note.success {
      border-color: rgba(141, 214, 163, 0.28);
      background: rgba(141, 214, 163, 0.08);
      color: #d4ffe0;
    }

    .mic-btn.listening {
      background: rgba(245, 142, 142, 0.16);
      border-color: rgba(245, 142, 142, 0.38);
      box-shadow: 0 0 0 8px rgba(245, 142, 142, 0.08);
      animation: pulse 1.2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.03);
      }
    }

    .answer-card,
    .feedback-card,
    .summary-card {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .answer-grid,
    .summary-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .input-shell {
      width: min(100%, 380px);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .input-shell input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      outline: none;
      font-size: 18px;
    }

    .result-badge.good {
      color: #d4ffe0;
      border-color: rgba(141, 214, 163, 0.38);
      background: rgba(141, 214, 163, 0.12);
    }

    .result-badge.bad {
      color: #ffd7d7;
      border-color: rgba(245, 142, 142, 0.38);
      background: rgba(245, 142, 142, 0.12);
    }

    .summary-big {
      font-family: var(--serif);
      font-size: clamp(42px, 8vw, 66px);
      line-height: 1;
    }

    .wrong-list {
      display: grid;
      gap: 12px;
    }

    .wrong-item {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: grid;
      gap: 10px;
    }

    .tiny {
      font-size: 13px;
      color: var(--muted);
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 960px) {
      .hero-grid,
      .trainer-layout,
      .plan-grid,
      .pairs-grid,
      .tools-grid,
      .answer-grid,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .rule-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        width: min(100vw - 14px, 100%);
        margin: 8px auto 28px;
      }

      .hero,
      .panel {
        padding: 16px;
        border-radius: 22px;
      }

      .prompt-card {
        min-height: 260px;
        padding: 20px 14px;
      }

      .tab-btn,
      .pill-btn,
      .action-btn,
      .ghost-btn {
        width: 100%;
        justify-content: center;
      }

      .search-box,
      .input-shell {
        min-width: 100%;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="eyebrow">Offline Learning Tool · Single File HTML</div>
      <div class="hero-grid">
        <div class="hero-copy">
          <h1>Phonics<br>Decode · Encode</h1>
          <p>把“字母组合怎么发音”和“听到发音怎么拼出来”放进同一个训练闭环。你可以把它当作一张系统规则表、一套 35 分钟每日流程，以及一间可随时开练的拼读训练室。规则表现在支持例词发音和音值示范两种播放方式。</p>
        </div>
        <div class="hero-stats">
          <div class="stat-card">
            <div class="stat-label">规则分类</div>
            <div class="stat-value">6</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">训练词条</div>
            <div class="stat-value">88</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">核心模式</div>
            <div class="stat-value">2</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">训练等级</div>
            <div class="stat-value">3</div>
          </div>
        </div>
      </div>
      <nav class="tabs" aria-label="主导航">
        <button id="tab-button-rules" class="tab-btn active" data-action="switch-tab" data-tab="rules">Tab 1 · 规则表</button>
        <button id="tab-button-plan" class="tab-btn" data-action="switch-tab" data-tab="plan">Tab 2 · 每日练习计划</button>
        <button id="tab-button-trainer" class="tab-btn" data-action="switch-tab" data-tab="trainer">Tab 3 · 拼读训练</button>
      </nav>
    </header>

    <main class="panels">
      <section id="tab-rules" class="panel active"></section>
      <section id="tab-plan" class="panel"></section>
      <section id="tab-trainer" class="panel"></section>
    </main>
  </div>

  <script>
    const RULE_CATEGORIES = [
      {
        categoryId: "open-closed-vowels",
        name: "元音字母 · 开音节 vs 闭音节",
        shortName: "开闭音节",

    const categoryLookup = Object.fromEntries(RULE_CATEGORIES.map((item) => [item.name, item]));

    const state = {
      activeTab: "rules",
      activeRuleCategory: RULE_CATEGORIES[0].categoryId,
      ruleSearch: "",
      voices: [],
      audioManifest: {
        words: {},
        examples: {},
        phonemes: {}
      },
      activeAudio: null,
      trainer: {
        mode: "decode",
        level: 1,
        session: null
      }
    };

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightText(text, query) {
      const safeText = escapeHtml(String(text));
      if (!query) return safeText;
      const regex = new RegExp(`(${escapeRegExp(query)})`, "ig");
      return safeText.replace(regex, "<mark>$1</mark>");
    }

    function normalizeWord(value) {
      return String(value || "").trim().toLowerCase();
    }

    function shuffleArray(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function createSession(mode, level) {
      return {
        mode,
        level,
        deck: shuffleArray(TRAINING_WORDS.filter((item) => item.level === level)),
        index: 0,
        correct: 0,
        attempted: 0,
        wrongItems: [],
        revealHint: false,
        answerVisible: false,
        evaluated: false,
        inputValue: "",
        transcript: "",
        recognitionStatus: "",
        recognitionTone: "",
        listening: false,
        completed: false
      };
    }

    function ensureSession() {
      if (!state.trainer.session || state.trainer.session.mode !== state.trainer.mode || state.trainer.session.level !== state.trainer.level) {
        state.trainer.session = createSession(state.trainer.mode, state.trainer.level);
      }
      return state.trainer.session;
    }

    function getCurrentItem() {
      const session = ensureSession();
      return session.deck[session.index] || null;
    }

    function getPreferredVoice() {
      const exact = state.voices.find((voice) => voice.lang === "en-US");
      if (exact) return exact;
      const us = state.voices.find((voice) => /en-us|american/i.test(`${voice.lang} ${voice.name}`));
      if (us) return us;
      return state.voices.find((voice) => /^en/i.test(voice.lang)) || null;
    }

    function loadVoices() {
      state.voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    }

    function speak(text) {
      if (!window.speechSynthesis || !text) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.85;
      const voice = getPreferredVoice();
      if (voice) utterance.voice = voice;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    async function loadAudioManifest() {
      try {
        const response = await fetch("data/audio-manifest.json");
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        state.audioManifest = await response.json();
      } catch (error) {
        console.warn("audio-manifest load failed, fallback to speechSynthesis only", error);
        state.audioManifest = {
          words: {},
          examples: {},
          phonemes: {}
        };
      }
    }

    function getAudioPath(kind, key) {
      if (!key) return "";
      return state.audioManifest?.[kind]?.[key] || "";
    }

    function stopActiveAudio() {
      if (!state.activeAudio) return;
      state.activeAudio.pause();
      state.activeAudio.currentTime = 0;
      state.activeAudio = null;
    }

    function playAudioResource(path, fallbackText = "") {
      if (!path) {
        speak(fallbackText);
        return Promise.resolve(false);
      }

      stopActiveAudio();
      const audio = new Audio(path);
      state.activeAudio = audio;
      return audio.play()
        .then(() => true)
        .catch((error) => {
          console.warn(`audio playback failed for ${path}, using fallback speech`, error);
          state.activeAudio = null;
          speak(fallbackText);
          return false;
        });
    }

    function playWordAudio(word) {
      const normalized = normalizeWord(word);
      const path = getAudioPath("words", normalized) || getAudioPath("examples", normalized);
      return playAudioResource(path, word);
    }

    function playPhonemeAudio(sound, demo) {
      const path = getAudioPath("phonemes", sound) || getAudioPath("examples", normalizeWord(demo));
      return playAudioResource(path, demo);
    }

    function getAccuracy(session) {
      if (!session.attempted) return 0;
      return Math.round((session.correct / session.attempted) * 100);
    }

    function scoreCurrent(isCorrect, source) {
      const session = ensureSession();
      const current = getCurrentItem();
      if (!current || session.evaluated) return;
      session.evaluated = true;
      session.answerVisible = true;
      session.attempted += 1;
      if (isCorrect) {
        session.correct += 1;
      } else {
        session.wrongItems.push({
          ...current,
          source,
          transcript: session.transcript
        });
      }
      playWordAudio(current.word);
      render();
    }

    function revealCurrentAnswer(markWrong = false) {
      const session = ensureSession();
      if (session.answerVisible) return;
      session.answerVisible = true;
      if (markWrong && !session.evaluated) {
        scoreCurrent(false, "give-up");
        return;
      }
      const current = getCurrentItem();
      if (current) playWordAudio(current.word);
      render();
    }

    function goToNextQuestion() {
      const session = ensureSession();
      if (session.index >= session.deck.length - 1) {
        session.completed = true;
        render();
        return;
      }
      session.index += 1;
      session.revealHint = false;
      session.answerVisible = false;
      session.evaluated = false;
      session.inputValue = "";
      session.transcript = "";
      session.recognitionStatus = "";
      session.recognitionTone = "";
      session.listening = false;
      render();
    }

    function restartSession() {
      state.trainer.session = createSession(state.trainer.mode, state.trainer.level);
      render();
    }

    function setMode(mode) {
      state.trainer.mode = mode;
      restartSession();
    }

    function setLevel(level) {
      state.trainer.level = level;
      restartSession();
    }

    function startRecognition() {
      const session = ensureSession();
      const current = getCurrentItem();
      if (!SpeechRecognition || !current) return;
      if (!recognition) {
        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = false;
        recognition.maxAlternatives = 3;

        recognition.onresult = (event) => {
          const transcriptList = [];
          for (const result of event.results[0]) {
            transcriptList.push(normalizeWord(result.transcript));
          }
          const isCorrect = transcriptList.some((text) => text === normalizeWord(current.word));
          session.transcript = transcriptList.join(" / ");
          session.recognitionStatus = isCorrect
            ? `识别结果：${session.transcript || "（空）"}`
            : `识别结果：${session.transcript || "（空）"}，你可以和目标词对照。`;
          session.recognitionTone = isCorrect ? "success" : "error";
          session.listening = false;
          scoreCurrent(isCorrect, "speech");
        };

        recognition.onerror = (event) => {
          session.listening = false;
          session.recognitionStatus = `语音识别暂时不可用：${event.error}。你仍然可以使用手动自评。`;
          session.recognitionTone = "error";
          render();
        };

        recognition.onend = () => {
          session.listening = false;
          render();
        };
      }

      try {
        session.recognitionStatus = "需要麦克风权限来识别你的发音。";
        session.recognitionTone = "";
        session.listening = true;
        render();
        recognition.start();
      } catch (error) {
        session.listening = false;
        session.recognitionStatus = "语音识别没有成功启动，请改用手动自评。";
        session.recognitionTone = "error";
        render();
      }
    }

    function getCategoryColor(categoryName) {
      return categoryLookup[categoryName]?.color || "rgba(255,255,255,0.18)";
    }

    function getSoundDemo(row) {
      const soundDemo = row.soundDemo || row.examples[0] || "";
      return soundDemo;
    }

    function getSoundDemoMeta(row) {
      if (row.sound.includes("不发音")) {
        return "播放代表例词，辅助理解这一条规则在真实单词中的读法。";
      }
      if (row.sound.includes("或")) {
        return "播放主示范音；多读法规则仍建议结合右侧例词一起听。";
      }
      return "播放这个音值的代表示范音。";
    }

    function getWrongCategoryStats(items) {
      const counts = {};
      items.forEach((item) => {
        item.categoryRefs.forEach((categoryName) => {
          counts[categoryName] = (counts[categoryName] || 0) + 1;
        });
      });
      return Object.entries(counts).sort((a, b) => b[1] - a[1]);
    }

    function restoreRuleSearchFocus(shouldFocus, selectionStart, selectionEnd) {
      if (!shouldFocus) return;
      const input = document.getElementById("rule-search");
      if (!input) return;
      input.focus();
      if (typeof selectionStart === "number" && typeof selectionEnd === "number") {
        input.setSelectionRange(selectionStart, selectionEnd);
      }
    }

    function renderRules(options = {}) {
      const {
        preserveFocus = false,
        selectionStart = null,
        selectionEnd = null
      } = options;
      const query = normalizeWord(state.ruleSearch);
      const matchingCategories = RULE_CATEGORIES
        .map((category) => {
          const matchedRows = category.rows.filter((row) => {
            const haystack = `${row.pattern} ${row.sound} ${row.examples.join(" ")} ${row.note}`.toLowerCase();
            return !query || haystack.includes(query);
          });
          return {
            category,
            matchedRows
          };
        })
        .filter(({ matchedRows }) => matchedRows.length > 0);

      const visibleCategories = query ? matchingCategories : RULE_CATEGORIES.map((category) => ({
        category,
        matchedRows: category.rows
      }));

      const content = visibleCategories.map(({ category, matchedRows }) => {
        const isOpen = query ? true : state.activeRuleCategory === category.categoryId;
        const rows = matchedRows.map((row) => {
          const haystack = `${row.pattern} ${row.sound} ${row.examples.join(" ")} ${row.note}`.toLowerCase();
          const isMatch = query ? haystack.includes(query) : false;
          const soundDemo = getSoundDemo(row);
          return `
            <div class="rule-row ${isMatch ? "match" : ""}">
              <div class="rule-cell">
                <div class="cell-kicker">Letter Pattern</div>
                <div class="pattern-chip" style="border-color:${category.color}; box-shadow: 0 0 0 1px ${category.color}33 inset;">${highlightText(row.pattern, query)}</div>
              </div>
              <div class="sound-cell">
                <div class="cell-kicker">Sound / IPA</div>
                <div class="sound-chip">
                  <span>${highlightText(row.sound, query)}</span>
                  <button
                    class="audio-btn compact"
                    type="button"
                    data-action="speak-phoneme"
                    data-sound="${escapeHtml(row.sound)}"
                    data-demo="${escapeHtml(soundDemo)}"
                    aria-label="播放音值示范 ${escapeHtml(row.sound)}"
                    title="播放音值示范"

                </div>
                <div class="sound-demo-meta">${getSoundDemoMeta(row)}</div>
              </div>
              <div class="rule-cell">
                <div class="cell-kicker">Examples</div>
                <div class="examples">
                ${row.examples.map((example) => `
                  <span class="example-chip">
                    <span>${highlightText(example, query)}</span>
                    <button class="audio-btn compact" type="button" data-action="speak-word" data-word="${escapeHtml(example)}" aria-label="播放 ${escapeHtml(example)}">🔊</button>
                  </span>
                `).join("")}

              </div>
              <div class="rule-cell">
                <div class="cell-kicker">Notes</div>
                <div class="tiny">${highlightText(row.note || "无特殊备注", query)}</div>
              </div>
            </div>

        }).join("");

        return `

            <button class="rule-toggle" type="button" data-action="toggle-rule" data-category="${category.categoryId}">
              <div class="rule-title">
                <span class="rule-swatch" style="background:${category.color};"></span>
                <div class="rule-meta">
                  <h3>${category.name}</h3>
                  <p>${category.shortName}</p>

              </div>
              <span class="rule-count">${query ? `命中 ${matchedRows.length} 条` : `${category.rows.length} 条规则 ${isOpen ? "· 收起" : "· 展开"}`}</span>
            </button>
            ${isOpen ? `
              <div class="rule-body">
                ${category.intro ? `<div class="rule-intro">${category.intro}</div>` : ""}

          </article>

      document.getElementById("tab-rules").innerHTML = `

          <div>
            <h2>拼读规则表</h2>
            <p>这是 letter pattern → sound 的映射表，不是音标总览。先找字母组合，再找发音和例词，最后回到训练里调用它。</p>

    document.addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const { action } = target.dataset;

      if (action === "switch-tab") {
        state.activeTab = target.dataset.tab;
        render();
        return;
      }

      if (action === "toggle-rule") {
        state.activeRuleCategory = state.activeRuleCategory === target.dataset.category
          ? ""
          : target.dataset.category;
        render();
        return;
      }

      if (action === "speak-word") {
        playWordAudio(target.dataset.word);
        return;
      }

      if (action === "speak-phoneme") {
        playPhonemeAudio(target.dataset.sound, target.dataset.demo);
        return;
      }

      if (action === "toggle-hint") {
        const session = ensureSession();
        session.revealHint = !session.revealHint;
        render();
        return;
      }

      if (action === "show-answer") {
        revealCurrentAnswer(false);
        return;
      }

      if (action === "show-answer-mark-wrong") {
        revealCurrentAnswer(true);
        return;
      }

      if (action === "decode-score") {
        scoreCurrent(target.dataset.value === "correct", "manual");
        return;
      }

      if (action === "next-question") {
        goToNextQuestion();
        return;
      }

      if (action === "set-mode") {
        setMode(target.dataset.mode);
        return;
      }

      if (action === "set-level") {
        setLevel(Number(target.dataset.level));
        return;
      }

      if (action === "restart-session") {
        restartSession();
        return;
      }

      if (action === "start-recognition") {
        startRecognition();
        return;
      }

      if (action === "check-encode") {
        const session = ensureSession();
        const item = getCurrentItem();
        if (!item || session.evaluated) return;
        const isCorrect = normalizeWord(session.inputValue) === normalizeWord(item.word);
        scoreCurrent(isCorrect, "typed");
      }
    });

    document.addEventListener("input", (event) => {
      if (event.target.id === "rule-search") {
        const shouldPreserveFocus = document.activeElement && document.activeElement.id === "rule-search";
        const selectionStart = event.target.selectionStart;
        const selectionEnd = event.target.selectionEnd;
        state.ruleSearch = event.target.value;
        renderRules({
          preserveFocus: shouldPreserveFocus,
          selectionStart,
          selectionEnd
        });
        return;
      }

      if (event.target.id === "encode-input") {
        const session = ensureSession();
        session.inputValue = event.target.value;
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && event.target.id === "encode-input") {
        event.preventDefault();
        const session = ensureSession();
        const item = getCurrentItem();
        if (!item || session.evaluated) return;
        const isCorrect = normalizeWord(session.inputValue) === normalizeWord(item.word);
        scoreCurrent(isCorrect, "typed");
      }
    });

    if (window.speechSynthesis) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    ensureSession();
    loadAudioManifest().finally(render);
  </script>
</body>
</html>
